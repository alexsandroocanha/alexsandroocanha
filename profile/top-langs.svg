<svg
  width="300"
  height="145"
  viewBox="0 0 300 145"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="descId"
>
  <title>Most Used Languages</title>
  <desc id="descId">GitHub top languages sem PLpgSQL e HTML</desc>
  <style>
    .header {
      font: 600 18px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif;
      fill: #58a6ff;
      animation: fadeInAnimation 0.8s ease-in-out forwards;
    }
    @supports(-moz-appearance: auto) {
      .header { font-size: 15.5px; }
    }
    .lang-name {
      font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #c9d1d9;
    }
    .stagger {
      opacity: 0;
      animation: fadeInAnimation 0.3s ease-in-out forwards;
    }
    #rect-mask rect {
      animation: slideInAnimation 1s ease-in-out forwards;
    }
    @keyframes slideInAnimation {
      from { width: 0; }
      to { width: calc(100%-100px); }
    }
    @keyframes growWidthAnimation {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes fadeInAnimation {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <rect x="0.5" y="0.5" rx="4.5" height="99%" stroke="#30363d" width="299" fill="#0d1117" stroke-opacity="1.0"/>

  <g transform="translate(25, 35)">
    <text x="0" y="0" class="header">Most Used Languages</text>
  </g>

  <g transform="translate(0, 55)">
    <svg x="25">
      <mask id="rect-mask">
        <rect x="0" y="0" width="250" height="8" fill="white" rx="5"/>
      </mask>

      <rect mask="url(#rect-mask)" x="0"      y="0" width="158.12" height="8" fill="#3572A5"/>
      <rect mask="url(#rect-mask)" x="158.12" y="0" width="60.44"  height="8" fill="#844FBA"/>
      <rect mask="url(#rect-mask)" x="218.56" y="0" width="15.87"  height="8" fill="#00ADD8"/>
      <rect mask="url(#rect-mask)" x="234.43" y="0" width="15.57"  height="8" fill="#89e051"/>

      <g transform="translate(0, 25)">
        <g transform="translate(0, 0)">
          <g transform="translate(0, 0)">
            <g class="stagger" style="animation-delay: 450ms">
              <circle cx="5" cy="6" r="5" fill="#3572A5"/>
              <text x="15" y="10" class="lang-name">Python 63.25%</text>
            </g>
          </g>
          <g transform="translate(0, 25)">
            <g class="stagger" style="animation-delay: 600ms">
              <circle cx="5" cy="6" r="5" fill="#844FBA"/>
              <text x="15" y="10" class="lang-name">HCL 24.18%</text>
            </g>
          </g>
        </g>
        <g transform="translate(150, 0)">
          <g transform="translate(0, 0)">
            <g class="stagger" style="animation-delay: 750ms">
              <circle cx="5" cy="6" r="5" fill="#00ADD8"/>
              <text x="15" y="10" class="lang-name">Go 6.35%</text>
            </g>
          </g>
          <g transform="translate(0, 25)">
            <g class="stagger" style="animation-delay: 900ms">
              <circle cx="5" cy="6" r="5" fill="#89e051"/>
              <text x="15" y="10" class="lang-name">Shell 6.22%</text>
            </g>
          </g>
        </g>
      </g>

    </svg>
  </g>
</svg>
