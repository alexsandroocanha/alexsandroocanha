name: Profile Readme Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Stats
        uses: teoxoy/profile-readme-stats@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
